<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>渡辺英司の思考回路 v1 — 思考フィルター機能</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans JP', sans-serif; background: radial-gradient(ellipse at 20% 80%, #0d1117 0%, #010409 50%, #0a0c10 100%); color: #c9d1d9; min-height: 100vh; overflow: hidden; }
    #graph-container { width: 100vw; height: 100vh; position: relative; }
    svg { width: 100%; height: 100%; display: block; }
    .controls { position: fixed; top: 20px; left: 20px; background: rgba(13, 17, 23, 0.96); padding: 20px; border-radius: 16px; z-index: 100; max-width: 340px; border: 1px solid rgba(48, 54, 61, 0.8); backdrop-filter: blur(20px); max-height: calc(100vh - 40px); overflow-y: auto; }
    .controls::-webkit-scrollbar { width: 6px; }
    .controls::-webkit-scrollbar-thumb { background: rgba(139, 148, 158, 0.3); border-radius: 3px; }
    .controls h1 { font-size: 1.1em; font-weight: 500; margin-bottom: 4px; color: #f0f6fc; }
    .controls .subtitle { font-size: 0.7em; color: #7d8590; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid rgba(48, 54, 61, 0.6); }
    .control-group { margin-bottom: 14px; }
    .control-group label { display: block; font-size: 0.65em; color: #7d8590; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.08em; }
    .help-hint { font-size: 0.85em; color: #58a6ff; font-weight: 400; text-transform: none; letter-spacing: 0; }
    .filter-btn { display: block; width: 100%; text-align: left; background: rgba(22, 27, 34, 0.6); border: 1px solid rgba(48, 54, 61, 0.6); color: #8b949e; padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: 0.78em; margin-bottom: 6px; transition: all 0.2s ease; position: relative; }
    .filter-btn:hover { background: rgba(33, 38, 45, 0.8); }
    .filter-btn.active { border-width: 2px; }
    .filter-btn .filter-title { font-weight: 600; display: flex; align-items: center; gap: 6px; }
    .filter-btn .edge-count { position: absolute; top: 8px; right: 8px; background: rgba(110, 118, 129, 0.15); padding: 2px 8px; border-radius: 8px; font-size: 0.65em; }
    .filter-btn.filter-explicit.active { background: rgba(63, 185, 80, 0.15); border-color: #3fb950; color: #7ee787; }
    .filter-btn.filter-latent.active { background: rgba(249, 199, 79, 0.15); border-color: #f9c74f; color: #f9c74f; }
    .filter-btn.filter-art.active { background: rgba(244, 162, 97, 0.15); border-color: #f4a261; color: #f4a261; }
    .filter-btn.filter-philosophy.active { background: rgba(148, 103, 189, 0.15); border-color: #9467bd; color: #c4a7e7; }
    .filter-btn.filter-linguistics.active { background: rgba(78, 205, 196, 0.15); border-color: #4ecdc4; color: #4ecdc4; }
    .filter-btn.filter-conceptual.active { background: rgba(56, 139, 253, 0.15); border-color: #388bfd; color: #79c0ff; }
    .toggle-btn { background: rgba(22, 27, 34, 0.6); border: 1px solid rgba(48, 54, 61, 0.6); color: #8b949e; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.75em; margin-right: 4px; margin-bottom: 4px; }
    .toggle-btn.active { background: rgba(56, 139, 253, 0.2); border-color: #388bfd; color: #79c0ff; }
    .reset-btn { background: transparent; border: 1px solid rgba(48, 54, 61, 0.6); color: #7d8590; padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 0.75em; width: 100%; margin-top: 8px; }
    .reset-btn:hover { background: rgba(22, 27, 34, 0.6); color: #c9d1d9; }
    .tag-window { position: fixed; bottom: 20px; right: 20px; background: rgba(13, 17, 23, 0.98); padding: 0; border-radius: 12px; border: 1px solid rgba(88, 166, 255, 0.5); z-index: 300; width: 380px; max-width: 90vw; display: none; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
    .tag-window.visible { display: block; }
    .tag-window-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 18px; border-bottom: 1px solid rgba(48, 54, 61, 0.8); background: rgba(22, 27, 34, 0.6); border-radius: 12px 12px 0 0; }
    .tag-window-header h3 { font-size: 0.95em; font-weight: 600; color: #f0f6fc; margin: 0; }
    .tag-window-close { background: none; border: none; color: #7d8590; font-size: 1.3em; cursor: pointer; padding: 0; line-height: 1; }
    .tag-window-close:hover { color: #f0f6fc; }
    .tag-window-body { padding: 18px; }
    .tag-window-content { font-size: 0.85em; color: #c9d1d9; line-height: 1.6; margin-bottom: 16px; }
    .tag-window-examples { font-size: 0.8em; color: #8b949e; padding: 12px; background: rgba(22, 27, 34, 0.5); border-radius: 8px; border-left: 3px solid #58a6ff; }
    .tag-window-examples strong { color: #c9d1d9; display: block; margin-bottom: 6px; }
    .tag-window-examples ul { margin: 0; padding-left: 18px; }
    .tag-window-examples li { margin-bottom: 4px; }
    .quadrant-diagram { margin: 12px 0; padding: 10px; background: rgba(22, 27, 34, 0.4); border-radius: 8px; }
    .quadrant-grid { display: grid; grid-template-columns: auto 1fr 1fr; gap: 4px; font-size: 0.6em; }
    .quadrant-cell { padding: 6px; border-radius: 4px; text-align: center; }
    .quadrant-header { color: #7d8590; padding: 4px; font-size: 0.9em; }
    .q-explicit { background: rgba(63, 185, 80, 0.2); color: #7ee787; }
    .q-latent { background: rgba(249, 199, 79, 0.2); color: #f9c74f; }
    .summary-container { margin: 14px 0; padding: 14px; background: rgba(22, 27, 34, 0.6); border-radius: 10px; border: 1px solid rgba(244, 162, 97, 0.3); }
    .summary-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .summary-title { font-size: 0.7em; color: #f4a261; text-transform: uppercase; letter-spacing: 0.08em; }
    .summary-question { font-size: 0.85em; font-weight: 500; color: #f0f6fc; text-align: center; padding: 8px; background: rgba(244, 162, 97, 0.1); border-radius: 6px; border-left: 3px solid #f4a261; }
    .summary-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 10px; font-size: 0.65em; }
    .summary-stat { background: rgba(22, 27, 34, 0.5); padding: 6px 8px; border-radius: 6px; display: flex; justify-content: space-between; }
    .summary-stat-label { color: #7d8590; }
    .summary-stat-value { color: #f0f6fc; font-family: 'JetBrains Mono', monospace; }
    .strength-bar-container { margin: 12px 0; padding: 10px; background: rgba(22, 27, 34, 0.4); border-radius: 8px; }
    .strength-bar-title { font-size: 0.6em; color: #7d8590; margin-bottom: 8px; text-transform: uppercase; }
    .strength-bar { display: flex; align-items: center; margin-bottom: 6px; }
    .strength-bar-label { width: 70px; font-size: 0.65em; color: #8b949e; }
    .strength-bar-track { flex: 1; height: 8px; background: rgba(48, 54, 61, 0.6); border-radius: 4px; position: relative; overflow: hidden; }
    .strength-bar-fill { position: absolute; left: 0; height: 100%; border-radius: 4px; }
    .legend { margin-top: 14px; padding-top: 10px; border-top: 1px solid rgba(48, 54, 61, 0.6); }
    .legend-title { font-size: 0.6em; color: #7d8590; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
    .legend-item { display: flex; align-items: center; margin-bottom: 4px; font-size: 0.7em; }
    .legend-color { width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }
    .edge-legend { margin-top: 12px; padding-top: 10px; border-top: 1px solid rgba(48, 54, 61, 0.6); }
    .edge-legend-title { font-size: 0.6em; color: #7d8590; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
    .edge-item { display: flex; align-items: center; margin-bottom: 4px; font-size: 0.65em; }
    .edge-line { width: 30px; height: 0; margin-right: 8px; }
    .node-detail { position: fixed; top: 20px; right: 20px; background: rgba(13, 17, 23, 0.96); padding: 18px; border-radius: 14px; z-index: 100; width: 300px; max-height: calc(100vh - 40px); overflow-y: auto; border: 1px solid rgba(48, 54, 61, 0.8); display: none; }
    .node-detail.visible { display: block; }
    .node-detail h3 { font-size: 0.95em; margin-bottom: 2px; color: #f0f6fc; }
    .node-detail .sublabel { font-size: 0.75em; color: #7d8590; margin-bottom: 10px; }
    .category-tag { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 12px; font-size: 0.7em; font-weight: 500; margin-bottom: 8px; }
    .section-title { font-size: 0.6em; color: #7d8590; text-transform: uppercase; letter-spacing: 0.08em; margin: 10px 0 6px; }
    .connections-list { font-size: 0.75em; color: #8b949e; }
    .connection-item { padding: 4px 0; display: flex; align-items: center; gap: 4px; border-left: 3px solid; padding-left: 8px; margin-bottom: 2px; }
    .connection-item.explicit { border-color: #3fb950; }
    .connection-item.latent { border-color: #f9c74f; }
    .connection-strength { font-size: 0.75em; padding: 1px 6px; border-radius: 3px; margin-left: auto; font-family: 'JetBrains Mono', monospace; color: #f4a261; }
    .close-btn { position: absolute; top: 8px; right: 8px; background: none; border: none; color: #7d8590; font-size: 1.1em; cursor: pointer; }
    .hub-ranking { position: fixed; top: 20px; right: 20px; background: rgba(13, 17, 23, 0.96); padding: 16px; border-radius: 14px; z-index: 100; width: 280px; border: 1px solid rgba(48, 54, 61, 0.8); max-height: calc(100vh - 40px); overflow-y: auto; }
    .hub-ranking::-webkit-scrollbar { width: 6px; }
    .hub-ranking::-webkit-scrollbar-thumb { background: rgba(139, 148, 158, 0.3); border-radius: 3px; }
    .hub-ranking h2 { font-size: 0.85em; margin-bottom: 12px; color: #f0f6fc; display: flex; align-items: center; gap: 6px; }
    .hub-ranking .tab-row { display: flex; gap: 4px; margin-bottom: 12px; }
    .hub-ranking .tab-btn { flex: 1; padding: 6px 8px; border: 1px solid rgba(48, 54, 61, 0.6); background: rgba(22, 27, 34, 0.6); color: #8b949e; border-radius: 6px; cursor: pointer; font-size: 0.7em; text-align: center; }
    .hub-ranking .tab-btn.active { border-color: #58a6ff; color: #79c0ff; background: rgba(56, 139, 253, 0.15); }
    .hub-ranking .tab-btn.tab-weighted.active { border-color: #f4a261; color: #f4a261; background: rgba(244, 162, 97, 0.15); }
    .hub-ranking .tab-btn.tab-degree.active { border-color: #3fb950; color: #7ee787; background: rgba(63, 185, 80, 0.15); }
    .ranking-item { display: flex; align-items: center; padding: 6px 0; border-bottom: 1px solid rgba(48, 54, 61, 0.4); cursor: pointer; transition: background 0.15s; }
    .ranking-item:hover { background: rgba(33, 38, 45, 0.6); margin: 0 -8px; padding-left: 8px; padding-right: 8px; border-radius: 4px; }
    .rank-number { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.6em; font-weight: 600; margin-right: 8px; }
    .rank-1 { background: linear-gradient(135deg, #f9c74f, #f4a261); color: #000; }
    .rank-2 { background: linear-gradient(135deg, #adb5bd, #6c757d); color: #000; }
    .rank-3 { background: linear-gradient(135deg, #cd7f32, #8b4513); color: #fff; }
    .rank-other { background: rgba(110, 118, 129, 0.2); color: #7d8590; }
    .rank-label { font-size: 0.72em; color: #c9d1d9; flex: 1; display: flex; align-items: center; gap: 4px; }
    .rank-value { font-size: 0.68em; font-family: 'JetBrains Mono', monospace; min-width: 50px; text-align: right; color: #f4a261; }
    .rank-bar { display: flex; align-items: center; gap: 4px; margin-top: 2px; }
    .rank-bar-track { width: 60px; height: 4px; background: rgba(48, 54, 61, 0.6); border-radius: 2px; overflow: hidden; }
    .rank-bar-fill { height: 100%; border-radius: 2px; background: linear-gradient(to right, #f4a261, #f9c74f); }
    .edge-tooltip { position: fixed; background: rgba(13, 17, 23, 0.96); padding: 10px 14px; border-radius: 8px; border: 1px solid #f4a261; font-size: 0.75em; color: #f0f6fc; pointer-events: none; z-index: 200; display: none; max-width: 300px; }
    .edge-tooltip.visible { display: block; }
    .regulator-marker { stroke: #00ff88; stroke-width: 3; stroke-dasharray: 4 2; fill: none; animation: regulatorPulse 2s ease-in-out infinite; }
    @keyframes regulatorPulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
  </style>
</head>
<body>
  <div id="graph-container"></div>
  <div class="tag-window" id="tagWindow">
    <div class="tag-window-header">
      <h3 id="tagWindowTitle">--</h3>
      <button class="tag-window-close" id="tagWindowClose">×</button>
    </div>
    <div class="tag-window-body">
      <div class="tag-window-content" id="tagWindowContent">--</div>
      <div class="tag-window-examples" id="tagWindowExamples">--</div>
    </div>
  </div>
  <div class="controls">
    <h1>🦋 渡辺英司の思考回路</h1>
    <p class="subtitle">v1 — 思考フィルター機能（明示性 × 思考タイプ）</p>
    <div class="summary-container">
      <div class="summary-header"><span class="summary-title">🎯 中心的問い</span></div>
      <div class="summary-question">「命名が事物を存在化させるのか」</div>
      <div class="summary-stats">
        <div class="summary-stat"><span class="summary-stat-label">ノード</span><span class="summary-stat-value" id="statNodes">49</span></div>
        <div class="summary-stat"><span class="summary-stat-label">エッジ</span><span class="summary-stat-value" id="statEdges">69</span></div>
        <div class="summary-stat"><span class="summary-stat-label">平均強度</span><span class="summary-stat-value" id="statAvgStrength">0.80</span></div>
        <div class="summary-stat"><span class="summary-stat-label">明示率</span><span class="summary-stat-value" id="statExplicitRatio">61%</span></div>
      </div>
    </div>
    <div class="quadrant-diagram">
      <div class="quadrant-grid">
        <div class="quadrant-header"></div>
        <div class="quadrant-header">明示的（実線）</div>
        <div class="quadrant-header">潜在的（点線）</div>
        <div class="quadrant-header">エッジ</div>
        <div class="quadrant-cell q-explicit" id="qExplicit">─ 42本</div>
        <div class="quadrant-cell q-latent" id="qLatent">┄ 27本</div>
      </div>
    </div>
    <div class="strength-bar-container">
      <div class="strength-bar-title">思考タイプ別エッジ数</div>
      <div class="strength-bar"><span class="strength-bar-label">アート</span><div class="strength-bar-track"><div class="strength-bar-fill" id="barArt" style="background: #f4a261;"></div></div></div>
      <div class="strength-bar"><span class="strength-bar-label">哲学</span><div class="strength-bar-track"><div class="strength-bar-fill" id="barPhilosophy" style="background: #9467bd;"></div></div></div>
      <div class="strength-bar"><span class="strength-bar-label">言語</span><div class="strength-bar-track"><div class="strength-bar-fill" id="barLinguistics" style="background: #4ecdc4;"></div></div></div>
    </div>
    <div class="control-group">
      <label>🔗 エッジ分類 <span class="help-hint">（クリックで詳細）</span></label>
      <button class="filter-btn filter-explicit active" id="btnExplicit"><span class="filter-title">─ 明示的（E₊ᵉ）</span><span class="edge-count" id="countExplicit">42</span></button>
      <button class="filter-btn filter-latent active" id="btnLatent"><span class="filter-title">┄ 潜在的（E₊ˡ）</span><span class="edge-count" id="countLatent">27</span></button>
    </div>
    <div class="control-group">
      <label>🏷️ 思考フィルター <span class="help-hint">（クリックで詳細）</span></label>
      <button class="filter-btn filter-art" id="btnArt"><span class="filter-title">🎨 アート思考</span><span class="edge-count" id="countArt">--</span></button>
      <button class="filter-btn filter-philosophy" id="btnPhilosophy"><span class="filter-title">📚 哲学思考</span><span class="edge-count" id="countPhilosophy">--</span></button>
      <button class="filter-btn filter-linguistics" id="btnLinguistics"><span class="filter-title">🗣️ 言語思考</span><span class="edge-count" id="countLinguistics">--</span></button>
    </div>
    <div class="control-group">
      <label>表示オプション</label>
      <button class="toggle-btn active" id="toggleLabels">ラベル</button>
      <button class="toggle-btn" id="toggleStrength">強度値</button>
      <button class="reset-btn" id="resetBtn">🔄 リセット</button>
    </div>
    <div class="edge-legend">
      <div class="edge-legend-title">エッジ凡例</div>
      <div class="edge-item"><div class="edge-line" style="border-top: 3px solid #7ee787;"></div>明示的</div>
      <div class="edge-item"><div class="edge-line" style="border-top: 2px dashed #f9c74f;"></div>潜在的</div>
    </div>
    <div class="legend">
      <div class="legend-title">カテゴリ</div>
      <div class="legend-item"><span class="legend-color" style="background: #388bfd;"></span>美学</div>
      <div class="legend-item"><span class="legend-color" style="background: #9467bd;"></span>哲学</div>
      <div class="legend-item"><span class="legend-color" style="background: #4ecdc4;"></span>言語学</div>
      <div class="legend-item"><span class="legend-color" style="background: #f4a261;"></span>作品</div>
      <div class="legend-item"><span class="legend-color" style="background: #3fb950;"></span>素材・技法</div>
      <div class="legend-item"><span class="legend-color" style="background: #f9c74f;"></span>モチーフ</div>
      <div class="legend-item"><span class="legend-color" style="background: #ff6b6b;"></span>活動</div>
    </div>
  </div>
  <div class="node-detail" id="nodeDetail">
    <button class="close-btn" id="closeDetail">×</button>
    <h3 id="detailLabel"></h3>
    <div class="sublabel" id="detailSublabel"></div>
    <div class="category-tag" id="detailCategory"></div>
    <div class="section-title">ハブスコア</div>
    <div class="connections-list" id="detailScores"></div>
    <div class="section-title">接続（強度順）</div>
    <div class="connections-list" id="detailConnections"></div>
  </div>
  <div class="hub-ranking" id="hubRanking">
    <h2>🔥 ハブ・ランキング</h2>
    <div class="tab-row">
      <button class="tab-btn tab-weighted active" id="tabWeighted">重み付き</button>
      <button class="tab-btn tab-degree" id="tabDegree">次数</button>
    </div>
    <div id="rankingList"></div>
  </div>
  <div class="edge-tooltip" id="edgeTooltip">
    <div><span id="tooltipSource">--</span> → <span id="tooltipTarget">--</span></div>
    <div><span id="tooltipType">--</span> / 強度: <span id="tooltipStrength">--</span></div>
    <div id="tooltipThought" style="font-size: 0.9em; color: #7d8590;"></div>
  </div>
  <script>
    const tagDescriptions = {
      explicit: { title: "─ 明示的エッジ（E₊ᵉ）", content: "作家本人のステートメント、インタビュー、作品解説などに直接言及されている接続。作家自身が意識的に表現している関係性を示します。", examples: "<strong>例：</strong><ul><li>《蝶瞰図》→ 胡蝶の夢（作家が明示的に言及）</li><li>《名称の庭》→ 命名（テーマとして直接提示）</li><li>図鑑 → 切り抜き（素材と技法の明示的関係）</li></ul>" },
      latent: { title: "┄ 潜在的エッジ（E₊ˡ）", content: "分析者による推論・解釈に基づく接続。作品や活動のパターンから導き出された、言語化されていないが構造的に存在する関係性を示します。", examples: "<strong>例：</strong><ul><li>言語の恣意性 → 命名（ソシュール理論との接続）</li><li>Merman → 境界（作品が暗示する概念）</li><li>脱構築 → 転倒・逆転（哲学的方法論の共有）</li></ul>" },
      art: { title: "🎨 アート思考", content: "美学（命名、存在、認識、分類、境界などの美学的原理）、作品、素材・技法、モチーフ、展覧会活動に関わるエッジ。渡辺英司の芸術実践の核心を形成し、美学的問いと具体的な制作プロセス、発表活動を結びつけます。", examples: "<strong>例：</strong><ul><li>命名 → 存在（美学的原理間の関係）</li><li>《名称の庭》→ 針金（素材の選択）</li><li>《蝶瞰図》→ 越後妻有（展示コンテクスト）</li><li>図鑑 → 本（形態的関係）</li></ul>" },
      philosophy: { title: "📚 哲学思考", content: "荘子、プラトン、デリダ、ハイデガーなどの哲学的概念に関わるエッジ。東洋哲学（胡蝶の夢、物化、万物斉同）と西洋哲学（イデア、模倣、脱構築）の両方を包含し、作品の思想的基盤を形成します。", examples: "<strong>例：</strong><ul><li>胡蝶の夢 → 荘子（出典関係）</li><li>イデア → 模倣（プラトン的関係）</li><li>脱構築 → 境界（デリダ的解体）</li><li>《蝶瞰図》→ 胡蝶の夢（作品と哲学の対話）</li></ul>" },

    const nodeLabels = node.append("text").text(d => d.label)
      .attr("x", d => d.isRegulator ? 18 : 15).attr("y", 4)
      .attr("fill", "#f0f6fc").attr("font-size", "9px").attr("opacity", 0.9)
      .style("pointer-events", "none");
    let showLabels = true, showStrength = false;
    simulation.on("tick", () => { link.attr("x1", d => d.source.x).attr("y1", d => d.source.y).attr("x2", d => d.target.x).attr("y2", d => d.target.y); strengthLabels.attr("x", d => (d.source.x + d.target.x) / 2).attr("y", d => (d.source.y + d.target.y) / 2); node.attr("transform", d => `translate(${d.x},${d.y})`); });
    function dragstarted(event) { if (!event.active) simulation.alphaTarget(0.3).restart(); event.subject.fx = event.subject.x; event.subject.fy = event.subject.y; }
    function dragged(event) { event.subject.fx = event.x; event.subject.fy = event.y; }
    function dragended(event) { if (!event.active) simulation.alphaTarget(0); event.subject.fx = null; event.subject.fy = null; }
    function showEdgeTooltip(event, d) { const sn = nodeMap.get(typeof d.source === "object" ? d.source.id : d.source); const tn = nodeMap.get(typeof d.target === "object" ? d.target.id : d.target); document.getElementById("tooltipSource").textContent = sn.label; document.getElementById("tooltipTarget").textContent = tn.label; document.getElementById("tooltipType").textContent = d.type === "explicit" ? "明示的" : "潜在的"; document.getElementById("tooltipStrength").textContent = d.strength.toFixed(2); const thoughtNames = { art: "🎨 アート思考", philosophy: "📚 哲学思考", linguistics: "🗣️ 言語思考" }; document.getElementById("tooltipThought").textContent = thoughtNames[d.thought]; const tooltip = document.getElementById("edgeTooltip"); tooltip.style.left = (event.pageX + 15) + "px"; tooltip.style.top = (event.pageY - 10) + "px"; tooltip.classList.add("visible"); }
    function hideEdgeTooltip() { document.getElementById("edgeTooltip").classList.remove("visible"); }
    function showNodeDetail(event, d) {
      document.getElementById("detailLabel").textContent = (d.icon || "") + " " + d.label;
      document.getElementById("detailSublabel").textContent = d.sublabel;
      const catTag = document.getElementById("detailCategory");
      catTag.textContent = categoryInfo[d.category].name;
      catTag.style.background = categoryInfo[d.category].color + "30";
      catTag.style.color = categoryInfo[d.category].color;
      document.getElementById("detailScores").innerHTML = `
        <div style="display: flex; justify-content: space-between; padding: 4px 0;">
          <span>次数:</span>
          <span style="color: #7ee787; font-family: 'JetBrains Mono', monospace;">${d.degree}</span>
        </div>
        <div style="display: flex; justify-content: space-between; padding: 4px 0;">
          <span>重み付き:</span>
          <span style="color: #f9c74f; font-family: 'JetBrains Mono', monospace;">${d.weightedDegree.toFixed(2)}</span>
        </div>
      `;
      const conns = edges.filter(e => {
        const sid = typeof e.source === "object" ? e.source.id : e.source;
        const tid = typeof e.target === "object" ? e.target.id : e.target;
        return sid === d.id || tid === d.id;
      }).sort((a,b) => b.strength - a.strength);
      document.getElementById("detailConnections").innerHTML = conns.map(e => {
        const sid = typeof e.source === "object" ? e.source.id : e.source;
        const tid = typeof e.target === "object" ? e.target.id : e.target;
        const oid = sid === d.id ? tid : sid;
        const on = nodeMap.get(oid);
        const dir = sid === d.id ? "→" : "←";
        const color = e.type === "explicit" ? "#7ee787" : "#f9c74f";
        return `<div class="connection-item ${e.type}"><span style="color:${categoryInfo[on.category].color}">●</span> ${dir} ${on.label}<span class="connection-strength" style="color:${color}">+${e.strength.toFixed(2)}</span></div>`;
      }).join("");
      document.getElementById("nodeDetail").classList.add("visible");
      document.getElementById("hubRanking").style.display = "none";
      circles.attr("stroke-width", n => n.id === d.id ? 4 : 2).attr("stroke", n => n.id === d.id ? "#f0f6fc" : "#21262d");
    }
    
    document.getElementById("closeDetail").onclick = () => {
      document.getElementById("nodeDetail").classList.remove("visible");
      document.getElementById("hubRanking").style.display = "block";
      circles.attr("stroke-width", 2).attr("stroke", "#21262d");
    };
    
    svg.on("click", () => {
      document.getElementById("nodeDetail").classList.remove("visible");
      document.getElementById("hubRanking").style.display = "block";
      circles.attr("stroke-width", 2).attr("stroke", "#21262d");
    });
    let currentTab = "weighted";
    function renderRanking(tab) { currentTab = tab; let sorted, valueKey, maxVal; if (tab === "weighted") { sorted = [...nodes].sort((a,b) => b.weightedDegree - a.weightedDegree); valueKey = "weightedDegree"; } else { sorted = [...nodes].sort((a,b) => b.degree - a.degree); valueKey = "degree"; } maxVal = sorted[0][valueKey]; document.getElementById("rankingList").innerHTML = sorted.slice(0, 12).map((n, i) => { const val = n[valueKey]; const display = val.toFixed(1); const barW = (val / maxVal) * 100; const rc = i === 0 ? "rank-1" : i === 1 ? "rank-2" : i === 2 ? "rank-3" : "rank-other"; return `<div class="ranking-item" data-node-id="${n.id}"><div class="rank-number ${rc}">${i + 1}</div><div class="rank-label">${n.icon || ""} ${n.label}</div><div><div class="rank-value">${display}</div><div class="rank-bar"><div class="rank-bar-track"><div class="rank-bar-fill" style="width:${barW}%"></div></div></div></div></div>`; }).join(""); document.querySelectorAll(".ranking-item").forEach(item => { item.onclick = () => { const nd = nodeMap.get(item.dataset.nodeId); if (nd) showNodeDetail(null, nd); }; }); }
    document.getElementById("tabWeighted").onclick = function() { document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active")); this.classList.add("active"); renderRanking("weighted"); };
    document.getElementById("tabDegree").onclick = function() { document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active")); this.classList.add("active"); renderRanking("degree"); };
    renderRanking("weighted");
    let showExplicit = true, showLatent = true;
    const activeThoughts = [];
    document.getElementById("btnExplicit").onclick = function() { const wasActive = this.classList.contains("active"); this.classList.toggle("active"); showExplicit = this.classList.contains("active"); if (!wasActive) showTagWindow("explicit"); updateVisibility(); };
    document.getElementById("btnLatent").onclick = function() { const wasActive = this.classList.contains("active"); this.classList.toggle("active"); showLatent = this.classList.contains("active"); if (!wasActive) showTagWindow("latent"); updateVisibility(); };
    function applyThoughtFilter(thoughtName) {
      const index = activeThoughts.indexOf(thoughtName);
      const wasActive = index > -1;
      if (wasActive) {
        activeThoughts.splice(index, 1);
      } else {
        activeThoughts.push(thoughtName);
        showTagWindow(thoughtName);
      }
      const btnMap = { "art": "btnArt", "philosophy": "btnPhilosophy", "linguistics": "btnLinguistics" };
      Object.keys(btnMap).forEach(key => {
        const btn = document.getElementById(btnMap[key]);
        if (btn) btn.classList.toggle("active", activeThoughts.includes(key));
      });
      updateVisibility();
    }
    document.getElementById("btnArt").onclick = () => applyThoughtFilter("art");
    document.getElementById("btnPhilosophy").onclick = () => applyThoughtFilter("philosophy");
    document.getElementById("btnLinguistics").onclick = () => applyThoughtFilter("linguistics");
    function updateVisibility() {
      // テーマフィルターによるノードセット
      const activeThoughtSet = activeThoughts.length > 0 ? new Set() : null;
      if (activeThoughtSet) {
        edges.forEach(e => {
          if (activeThoughts.includes(e.thought)) {
            const sid = typeof e.source === "object" ? e.source.id : e.source;
            const tid = typeof e.target === "object" ? e.target.id : e.target;
            activeThoughtSet.add(sid);
            activeThoughtSet.add(tid);
          }
        });
      }
      
      // ノードの表示
      node.transition().duration(300).style("opacity", d => {
        if (!activeThoughtSet) return 1;
        return activeThoughtSet.has(d.id) ? 1 : 0.1;
      });
      
      // エッジの表示
      link.transition().duration(300).attr("opacity", d => {
        if (d.type === "explicit" && !showExplicit) return 0;
        if (d.type === "latent" && !showLatent) return 0;
        
        // 思考フィルター（ノードベース）
        if (activeThoughtSet) {
          const srcId = typeof d.source === "object" ? d.source.id : d.source;
          const tgtId = typeof d.target === "object" ? d.target.id : d.target;
          if (!activeThoughtSet.has(srcId) || !activeThoughtSet.has(tgtId)) return 0.05;
        }
        return 0.8;
      });
      
      // 強度ラベルの表示
      strengthLabels.attr("opacity", d => {
        if (!showStrength) return 0;
        if (d.type === "explicit" && !showExplicit) return 0;
        if (d.type === "latent" && !showLatent) return 0;
        if (activeThoughtSet) {
          const srcId = typeof d.source === "object" ? d.source.id : d.source;
          const tgtId = typeof d.target === "object" ? d.target.id : d.target;
          if (!activeThoughtSet.has(srcId) || !activeThoughtSet.has(tgtId)) return 0;
        }
        return 1;
      });
      
      nodeLabels.attr("opacity", showLabels ? 0.9 : 0);
    }
    document.getElementById("toggleLabels").onclick = function() { this.classList.toggle("active"); showLabels = this.classList.contains("active"); nodeLabels.attr("opacity", showLabels ? 0.9 : 0); };
    document.getElementById("toggleStrength").onclick = function() { this.classList.toggle("active"); showStrength = this.classList.contains("active"); strengthLabels.attr("opacity", showStrength ? 1 : 0); };
    document.getElementById("resetBtn").onclick = () => {
      showExplicit = true; showLatent = true;
      activeThoughts.length = 0;
      document.querySelectorAll(".filter-btn.filter-explicit, .filter-btn.filter-latent").forEach(b => b.classList.add("active"));
      document.querySelectorAll(".filter-btn.filter-art, .filter-btn.filter-philosophy, .filter-btn.filter-linguistics").forEach(b => b.classList.remove("active"));
      document.getElementById("toggleLabels").classList.add("active");
      document.getElementById("toggleStrength").classList.remove("active");
      showLabels = true; showStrength = false;
      node.transition().duration(300).style("opacity", 1);
      link.transition().duration(300).attr("opacity", 0.8);
      strengthLabels.attr("opacity", 0);
      nodeLabels.attr("opacity", 0.9);
      circles.attr("stroke-width", 2).attr("stroke", "#21262d");
      document.getElementById("nodeDetail").classList.remove("visible");
      document.getElementById("hubRanking").style.display = "block";
      document.getElementById("tagWindow").classList.remove("visible");
    };
  </script>
</body>
</html>
